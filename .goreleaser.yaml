version: 2

project_name: SmartHome.Hub

builds:
  - id: launcher
    dir: ./backend
    main: ./cmd/launcher
    binary: smarthome-hub
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.author=Project-SmartHome
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    hooks:
      pre:
        # Build and embed Angular frontend
        - bash -c 'if [ -d "../frontend" ]; then cd ../frontend && npm install --legacy-peer-deps && npm run build:hubapp && npm run build:shell && mkdir -p ../backend/pkg/hub/frontend && cp -r dist/* ../backend/pkg/hub/frontend/ || cp -r dist/*/dist/* ../backend/pkg/hub/frontend/ 2>/dev/null || true; fi'

universal_binaries:
  - id: launcher                # Connects to your build block ID above
    ids:
      - launcher
    name_template: smarthome-hub
    replace: true

archives:
  - id: archive
    builds:
      - launcher
    formats:
      - tar.gz
      - zip
    wrap_in_directory: true

checksum:
  name_template: checksums.txt

release:
  prerelease: auto
  draft: false
  extra_files:
    - glob: ./dist/*.pkg

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'