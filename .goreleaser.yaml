version: 2

project_name: SmartHome.Hub

before:
  hooks:
    - |
      bash -c '
        if [ -d "./frontend" ]; then
          cd ./frontend &&
          npm install --legacy-peer-deps &&
          npm run build:hubapp &&
          npm run build:shell
        fi
      '

    - |
      bash -c '
        rm -rf backend/pkg/hub/frontend &&
        mkdir -p backend/pkg/hub/frontend &&
        cp -R frontend/dist/shell backend/pkg/hub/frontend/ &&
        cp -R frontend/dist/hubapp backend/pkg/hub/frontend/
      '

builds:
  - id: launcher
    dir: ./backend
    main: ./cmd/launcher
    binary: smarthome-hub
    ldflags:
      - -s -w
      - -X main.version={{ .Version }} 
      - -X main.author=Project-SmartHome

    goos:
      - linux

    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

# =========================================================
# ARCHIVES
# =========================================================

archives:
  - id: linux-archives
    ids:
      - launcher
    formats:
      - tar.gz
      - zip
    wrap_in_directory: true

# =========================================================
# LINUX PACKAGES
# =========================================================

nfpms:
  - id: linux-packages
    package_name: smarthome-hub
    vendor: Project-SmartHome
    homepage: "https://github.com/Project-SmartHome/SmartHome.Hub"
    maintainer: "Project-SmartHome"
    description: |
      Smart home automation hub.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/local/bin
    contents:
      # Frontend assets
      - src: ./frontend/dist
        dst: /usr/local/share/smarthome/frontend

    scripts:
      postinstall: packaging/linux/postinstall.sh
      preremove: packaging/linux/preremove.sh

# =========================================================
# CHECKSUMS
# =========================================================

checksum:
  name_template: checksums.txt

# =========================================================
# RELEASE
# =========================================================

release:
  prerelease: auto
  draft: false
# =========================================================
# CHANGELOG
# =========================================================

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
