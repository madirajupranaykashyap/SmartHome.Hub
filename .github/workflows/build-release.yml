name: Build and Release

on:
  push:
    branches:
      - main
# on:
#   push:
#     tags:
#       - 'v*'

permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          registry-url: 'https://pkgs.dev.azure.com/madirajupranaykashyap/HomeAutomation/_packaging/HomeAutomationFeed/npm/registry/'
          scope: '@ha'

      - name: Build Angular frontend
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm run build:hubapp
          npm run build:shell
        env:
          NODE_AUTH_TOKEN: ${{ secrets.AZURE_ARTIFACTS_TOKEN }}

      - name: Embed frontend in Go
        run: |
          mkdir -p backend/pkg/hub/frontend
          cp -r frontend/dist/* backend/pkg/hub/frontend/

      - name: Get latest tag
        id: tag
        run: |
          git fetch --tags

          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v0.0.1"
          else
            VERSION=${LATEST_TAG#v}

            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

            PATCH=$((PATCH + 1))

            NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          fi

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create Tag
        run: |
          git tag ${{ steps.tag.outputs.new_tag }}
          git push origin ${{ steps.tag.outputs.new_tag }}


      - name: Build with goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: backend
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: backend/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
