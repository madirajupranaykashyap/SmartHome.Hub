name: Build and Release

on:
  push:
    branches:
      - main
# on:
#   push:
#     tags:
#       - 'v*'

permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          registry-url: 'https://pkgs.dev.azure.com/madirajupranaykashyap/HomeAutomation/_packaging/HomeAutomationFeed/npm/registry/'
          scope: '@ha'

      - name: Build Angular frontend
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm run build:hubapp
          npm run build:shell
        env:
          NODE_AUTH_TOKEN: ${{ secrets.AZURE_ARTIFACTS_TOKEN }}

      - name: Embed frontend in Go
        run: |
          mkdir -p backend/pkg/hub/frontend
          cp -r frontend/dist/* backend/pkg/hub/frontend/

      - name: Build with goreleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: backend
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: backend/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
