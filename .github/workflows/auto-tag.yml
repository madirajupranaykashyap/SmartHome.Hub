name: Auto Tag Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version from .Manifest
        id: read_manifest
        run: |
          VERSION=$(jq -r '.currentVersion' .Manifest)
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo 'Manifest version is empty'
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag if missing
        env:
          VERSION: ${{ steps.read_manifest.outputs.version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if [[ ! "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "VERSION '$VERSION' is not a valid semver format (major.minor.patch)"
            exit 1
          fi

          MAJOR=${BASH_REMATCH[1]}
          MINOR=${BASH_REMATCH[2]}
          PATCH=${BASH_REMATCH[3]}
          TAG="v${MAJOR}.${MINOR}.${PATCH}"

          while git rev-parse "$TAG" >/dev/null 2>&1; do
            echo "Tag $TAG already exists, incrementing patch version"
            PATCH=$((PATCH + 1))
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
          done

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created tag $TAG"
        shell: bash