<ng-container *ngIf="userRooms$ | async as userRooms">
    <ng-container *ngIf="allRooms$ | async as allRooms">
        <ha-rooms
            [UserRooms]="userRooms"
            [allRooms]="allRooms"></ha-rooms>
        <ng-container *ngIf="userRooms.state === 'hasError'">
            hasError
        </ng-container>
    </ng-container>
</ng-container>
